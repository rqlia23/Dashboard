<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Dashboard Juegos</title>

  <style>
    
    :root {
      --bg: #f1f5f9;
      --text: #0f172a;
      --card: #ffffff;
      --sidebar: #0f172a;
      --sidebar-text: #ffffff;
    }
    
    body {
      /*margin: 0;
      font-family: Arial, sans-serif;
      background: #f1f5f9;*/
      background: var(--bg);
      color: var(--text)
    }
    
    body {
      transition: 0.3s;
    }

    .app {
      display: flex;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      /*height: 100vh;
      background: #0f172a;
      color: white;
      padding: 20px;*/
      background: var(--sidebar);
      color: var(--sidebar-text);
    }

    .sidebar p {
      padding: 10px;
      cursor: pointer;
      border-radius: 6px;
    }

    .sidebar p:hover {
      background: rgba(255,255,255,0.1);
    }

    .sidebar .active {
      background: #22c55e;
    }

    /* MAIN */
    .main {
      flex: 1;
      padding: 30px;
    }

    /* CARDS */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin: 20px 0;
    }

    .card {
      /*background: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;*/
      background: var(--card)
    }

    .card h2 {
      color: #22c55e;
    }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
    }

    .box {
      /*background: white;
      padding: 20px;
      border-radius: 12px;*/
      background: var(--box)
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }

    .section {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0 }
      to { opacity: 1 }
    }

    .bar {
      height: 10px;
      background: #22c55e;
      border-radius: 5px;
    }

    .dark {
      --bg: #0f172a;
      --text: #e2e8f0;
      --card: #1e293b;
      --sidebar: #020617;
      --sidebar-text: #e2e8f0;
    }

    /*button {
      background: var(--card);
      color: var(--text);
      border: 1px solid #e2e8f0;

      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;

      font-size: 14px;
      font-weight: 500;

      transition: all 0.2s ease;
    }*/

    button,
    select {
      height: 36px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      padding: 0 14px;
      font-size: 14px;
      line-height: 36px;
    }

    select {
      padding: 0 30px 0 10px;
      appearance: none;
      display: inline-block;
    }

    /* HOVER */
    /*button:hover {
      background: #22c55e;
      color: white;
      border-color: #22c55e;
    }*/
    
    button:hover,
    select:hover {
      border-color: #22c55e;
    }

    /* CLICK */
    button:active {
      transform: scale(0.97);
    }

    select:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2);
    }


    .button-primary {
      background: #22c55e;
      color: white;
      border: none;
    }

    .button-primary:hover {
      background: #16a34a;
    }

    #themeToggle {
      height: 36px;
      padding: 0 14px;
      border-radius: 20px;
  }

    
    .top-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }


  </style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>🎮 Dashboard</h2>
    <p class="menu active" data-section="overview">📊 Overview</p>
    <p class="menu" data-section="games">🎮 Juegos</p>
    <p class="menu" data-section="analytics">📈 Analytics</p>
    <p class="menu" data-section="settings">⚙️ Configuración</p>
  </aside>

  <main class="main">
  <!--button id="themeToggle">🌙 Modo oscuro</button-->
  <!--button class="button-primary">Reset datos</button-->

    <div class="top-controls">
      <button id="themeToggle">🌙 Modo oscuro</button>

      <select id="gameFilter">
        <option value="all">Todos</option>
        <option value="Snake">Snake</option>
        <option value="Breakout">Breakout</option>
      </select>
    </div>
  
    <h1>📊 Dashboard de Juegos</h1>

    <!-- OVERVIEW -->
    <div id="overview" class="section">

      <div class="cards">
        <div class="card"><h2>0</h2><p>Usuarios</p></div>
        <div class="card"><h2>0</h2><p>Partidas</p></div>
        <div class="card"><h2>0</h2><p>Tiempo medio</p></div>
        <div class="card"><h2>0</h2><p>Max Score</p></div>
      </div>

      <div class="grid">
        <div class="box">
          <h3>🎮 Uso por juego</h3>
          <p>Snake</p>
          <div class="bar"></div>
          <p>Breakout</p>
          <div class="bar"></div>
        </div>
      </div>

    </div>

    <!-- JUEGOS -->
    <div id="games" class="section" style="display:none;">
      <div class="box">
        <h3>📋 Partidas</h3>
        <table>
          <thead>
            <tr>
              <th>Juego</th>
              <th>Puntuación</th>
              <th>Hora</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ANALYTICS -->
    <div id="analytics" class="section" style="display:none;">
      <div class="box">
        <h3>📈 Gráfico</h3>
        <canvas id="myChart"></canvas>
      </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="section" style="display:none;">
      <div class="box">
        <p>Configuración futura</p>
      </div>
    </div>
  </main>
</div>

<script>

let games = ["Snake", "Breakout"];
let data = [];
let currentFilter = "all";
let chart;

/* SIDEBAR */
const menuItems = document.querySelectorAll(".menu");
const sections = document.querySelectorAll(".section");

menuItems.forEach(item => {
  item.addEventListener("click", () => {
    menuItems.forEach(i => i.classList.remove("active"));
    item.classList.add("active");

    sections.forEach(s => s.style.display = "none");

    const target = item.getAttribute("data-section");
    document.getElementById(target).style.display = "block";
  });
});

/*JavaScript*/
const toggleBtn = document.getElementById("themeToggle");

// cargar tema guardado
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
}

// cambiar tema
toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    toggleBtn.textContent = "☀️ Modo claro";
  } else {
    localStorage.setItem("theme", "light");
    toggleBtn.textContent = "🌙 Modo oscuro";
  }
});

/* DATA */
function loadData() {
  const stored = localStorage.getItem("gameData");
  if (stored) data = JSON.parse(stored);
}

if (document.body.classList.contains("dark")) {
  toggleBtn.textContent = "☀️ Modo claro";
}

function saveData() {
  localStorage.setItem("gameData", JSON.stringify(data));
}

function generateData() {
  const newGame = {
    game: games[Math.floor(Math.random()*2)],
    score: Math.floor(Math.random()*1000),
    time: new Date().toLocaleTimeString()
  };

  data.unshift(newGame);
  if (data.length > 20) data.pop();

  saveData();
}

/* FILTER */
function getFilteredData() {
  if (currentFilter === "all") return data;
  return data.filter(d => d.game === currentFilter);
}

/* TABLE */
function updateTable() {
  const filtered = getFilteredData();
  const table = document.getElementById("tableBody");

  table.innerHTML = "";
  filtered.forEach(d => {
    table.innerHTML += `
      <tr>
        <td>${d.game}</td>
        <td>${d.score}</td>
        <td>${d.time}</td>
      </tr>
    `;
  });
}

/* CARDS */
function updateStats() {
  const filtered = getFilteredData();

  document.querySelectorAll(".card h2")[1].textContent = filtered.length;
  document.querySelectorAll(".card h2")[3].textContent =
    Math.max(...filtered.map(d=>d.score), 0);
}

/* CHART */
function createChart() {
  const ctx = document.getElementById("myChart");

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels: [],
      datasets: [
        {
          label: "Snake",
          data: [],
          borderColor: "#22c55e",
          tension: 0.4
        },
        {
          label: "Breakout",
          data: [],
          borderColor: "#f59e0b",
          tension: 0.4
        }
      ]
    }
  });
}

function updateChart() {
  chart.data.labels = data.map((_,i)=>i+1);

  chart.data.datasets[0].data =
    data.filter(d=>d.game==="Snake").map(d=>d.score);

  chart.data.datasets[1].data =
    data.filter(d=>d.game==="Breakout").map(d=>d.score);

  chart.update();
}

/* MAIN LOOP */
function updateDashboard() {
  loadData();
  generateData();
  updateStats();
  updateTable();
  updateChart();
}

loadData();
createChart();
updateDashboard();
setInterval(updateDashboard, 3000);

document.getElementById("gameFilter").addEventListener("change", e => {
  currentFilter = e.target.value;
  updateDashboard();
});

</script>

</body>
</html>
